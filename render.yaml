services:
  - type: web
    name: skillforge-backend
    env: python
    region: oregon
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn app:app --chdir backend --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        fromSecret: GROQ_API_KEY
